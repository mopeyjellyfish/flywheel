interface:
  display_name: "$flywheel:brainstorm"
  short_description: "Refine ideas into a requirements plan"
  default_prompt: "Use $flywheel:brainstorm to turn this idea into a right-sized requirements doc before planning, reuse saved research when it is fresh, run a short current-practice research pass on the user's behalf when it would materially change the requirements, fold the decision-changing findings and recommendation into the requirements artifact, and pull in high-level architecture direction only when boundaries or pattern choices materially affect scope or behavior."
