version: 1

id: go
description: Go language review extension with module-aware, version-gated idiom checks.

match:
  changed_files:
    - "**/*.go"
    - "go.mod"
    - "go.sum"
  manifests:
    - "go.mod"

add_reviewers:
  - go-reviewer

references:
  - references/stack-packs/go-review-basis.md

selection_notes:
  - Read `go.mod` before applying version-gated guidance.
  - Use repo truth for format, lint, test, and vulnerability commands before
    importing generic Go advice.
  - Do not activate the pack from prose-only mentions of Go.
